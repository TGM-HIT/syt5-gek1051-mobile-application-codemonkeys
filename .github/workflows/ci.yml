name: CI

on:
  push:
  pull_request:
    branches:
      - main
      - dev

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Run unit tests with coverage
        working-directory: frontend
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: frontend/coverage/
          retention-days: 30

      - name: Coverage summary comment (PRs)
        uses: davelosert/vitest-coverage-report-action@v2
        if: always()
        with:
          working-directory: frontend

      - name: Update coverage badge in README
        if: github.event_name == 'push'
        run: |
          python3 -c "
import json, re
with open('frontend/coverage/coverage-summary.json') as f:
    j = json.load(f)
t = j['total']
avg = round((t['lines']['pct'] + t['branches']['pct'] + t['functions']['pct'] + t['statements']['pct']) / 4)
color = 'brightgreen' if avg >= 80 else 'green' if avg >= 70 else 'yellow' if avg >= 60 else 'red'
with open('README.md', 'r') as f:
    content = f.read()
content = re.sub(
    r'!\[Coverage\]\(https://img\.shields\.io/badge/coverage-[^)]+\)',
    f'![Coverage](https://img.shields.io/badge/coverage-{avg}%25-{color})',
    content
)
with open('README.md', 'w') as f:
    f.write(content)
print(f'Coverage: {avg}% ({color})')
"
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md
          git diff --staged --quiet || git commit -m "chore: update coverage badge [skip ci]"
          git push

  e2e:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: frontend
        run: npm run test:e2e

      - name: Upload E2E test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

      - name: Upload E2E test screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-screenshots
          path: frontend/test-results/
          retention-days: 7
