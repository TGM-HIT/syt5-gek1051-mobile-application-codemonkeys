name: Update STORIES.md Status

on:
  issues:
    types: [opened, closed, reopened]
  workflow_dispatch:

jobs:
  update-markdown:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Bot darf Code hochladen
      issues: read          # Bot darf Issues lesen
      pull-requests: write  # NEU: Bot darf Pull Requests erstellen

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # --- SCHRITT 1: Single Issue Update ---
      - name: Update Status in STORIES.md (Single Issue)
        if: github.event_name == 'issues'
        run: |
          ISSUE_URL="${{ github.event.issue.html_url }}"
          STATE="${{ github.event.issue.state }}"
          
          if [ "$STATE" = "closed" ]; then
            NEW_STATUS="[🔴 Closed]($ISSUE_URL)"
          else
            NEW_STATUS="[🟢 Open]($ISSUE_URL)"
          fi
          
          sed -i -E "s|\[[^]]+\]\($ISSUE_URL\)|$NEW_STATUS|g" STORIES.md

      # --- SCHRITT 2: Sync ALL Issues ---
      - name: Sync ALL Issues in STORIES.md (Manual Sync)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          grep -oE 'https://github.com/[^/]+/[^/]+/issues/[0-9]+' STORIES.md | sort -u | while read -r url; do
            ISSUE_NUM=$(echo "$url" | awk -F'/' '{print $NF}')
            STATE=$(gh issue view "$ISSUE_NUM" --json state -q .state || echo "OPEN")
            
            if [ "$STATE" = "CLOSED" ]; then
              sed -i -E "s|\[[^]]+\]\($url\)|[🔴 Closed]($url)|g" STORIES.md
            else
              sed -i -E "s|\[[^]]+\]\($url\)|[🟢 Open]($url)|g" STORIES.md
            fi
            echo "Updated Issue #$ISSUE_NUM to $STATE"
          done

      # --- SCHRITT 3: NEU - Pull Request erstellen statt direktem Push ---
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: Update issue statuses in STORIES.md"
          title: "🤖 Auto-Update: Issue Status in STORIES.md"
          body: |
            Dieser Pull Request wurde automatisch vom GitHub Action Bot erstellt.
            Er aktualisiert den Open/Closed Status in der `STORIES.md`.
          branch: "bot/update-stories-status" # Der Bot erstellt diesen temporären Branch
          delete-branch: true                 # Branch wird nach dem Mergen gelöscht
